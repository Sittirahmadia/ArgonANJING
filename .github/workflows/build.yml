name: Build Argon Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Replaces manual `chmod +x gradlew` + cache block.
      # Downloads the wrapper jar if it is missing, validates its checksum,
      # and caches both the Gradle distribution and the build cache.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper   # use the version declared in gradle-wrapper.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: argon-mod
          path: build/libs/*.jar
          if-no-files-found: warn
          retention-days: 14
